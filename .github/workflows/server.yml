name: Server CI

on:
  push:
    branches: [main]
    paths:
      - "skyjo-server/**"
      - "skyjo-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "skyjo-server/**"
      - "skyjo-core/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-server-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-server-clippy-
      - run: cargo clippy --manifest-path skyjo-server/Cargo.toml --locked -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-server-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-server-test-
      - run: cargo test --locked --manifest-path skyjo-server/Cargo.toml
