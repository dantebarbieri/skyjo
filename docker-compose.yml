services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://skyjo:${DB_PASSWORD:-skyjo}@db:5432/skyjo
      - SKYJO_JWT_SECRET=${JWT_SECRET:-}
      - SKYJO_DATA_DIR=/var/lib/skyjo
    volumes:
      - skyjo-data:/var/lib/skyjo
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "2", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=skyjo
      - POSTGRES_USER=skyjo
      - POSTGRES_PASSWORD=${DB_PASSWORD:-skyjo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyjo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  skyjo-data:
  postgres-data:
